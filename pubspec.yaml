name: vtt_to_lrc
description: "VTT → LRC 字幕转换器"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  macos_ui: ^2.1.4
  desktop_drop: ^0.5.0
  file_picker: ^8.0.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    # 目录形式打包，运行时按宿主 OS+架构选择对应二进制
    # （vtt-to-lrc-{macos,linux}-{arm64,x64}[.exe]），
    # 同时自动包含每个二进制旁的 .stamp 文件供启动期快速比对。
    - assets/backend/
